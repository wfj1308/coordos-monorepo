<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoordOS Design Institute Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      顶部区域：
      1) 展示当前控制台名称与用途
      2) 通过简洁引导降低首次使用门槛
    -->
    <header class="hero">
      <div class="hero-content">
        <p class="badge">CoordOS • UI / API Console</p>
        <h1>Design Institute 前端控制台</h1>
        <p class="subtitle">
          单页调试台：配置服务地址，触发关键 API，请求与响应同屏查看。
        </p>
      </div>
      <div class="hero-orb orb-a"></div>
      <div class="hero-orb orb-b"></div>
    </header>

    <main class="layout">
      <!--
        配置栏：
        - base URL 可独立配置，方便同时对接本地/测试环境
        - 存储在 localStorage，减少重复输入
      -->
      <section class="panel config-panel">
        <h2>环境配置</h2>
        <label>
          <span>Design-Institute Base URL</span>
          <input id="designBaseUrl" type="text" placeholder="http://localhost:8090" />
        </label>
        <label>
          <span>Vault-Service Base URL</span>
          <input id="vaultBaseUrl" type="text" placeholder="http://localhost:8080" />
        </label>
        <label>
          <span>Vault Token (Bearer)</span>
          <input id="vaultToken" type="text" placeholder="10000:v://10000/person/hq:HEAD_OFFICE,PLATFORM" />
        </label>
        <button id="saveConfigBtn" class="btn btn-primary">保存配置</button>
      </section>

      <!--
        快捷动作：
        这些按钮封装了最常见的验收动作，便于快速验证服务健康和主链路。
      -->
      <section class="panel quick-panel">
        <h2>快捷动作</h2>
        <div class="quick-grid">
          <button class="btn btn-card" data-action="di-health">检查 DI 健康</button>
          <button class="btn btn-card" data-action="vault-health">检查 Vault 健康</button>
          <button class="btn btn-card" data-action="di-project-list">列出项目</button>
          <button class="btn btn-card" data-action="di-report-overview">经营概览报表</button>
          <button class="btn btn-card" data-action="vault-root-project">创建 Vault 根项目</button>
        </div>
      </section>

      <!--
        请求编辑器：
        - 可自定义 method/path/body，作为通用 API 调试入口
        - 提供 JSON 预设按钮，减少手写成本
      -->
      <section class="panel request-panel">
        <h2>请求编辑器</h2>
        <div class="request-row">
          <select id="requestService">
            <option value="di">Design-Institute</option>
            <option value="vault">Vault-Service</option>
          </select>
          <select id="requestMethod">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
          </select>
          <input id="requestPath" type="text" value="/health" />
        </div>
        <textarea
          id="requestBody"
          spellcheck="false"
          placeholder='{"example":"json-body"}'
        ></textarea>
        <div class="request-actions">
          <button id="runRequestBtn" class="btn btn-primary">发送请求</button>
          <button id="presetProjectBtn" class="btn btn-secondary">填充创建项目示例</button>
          <button id="presetEventBtn" class="btn btn-secondary">填充事件示例</button>
        </div>
      </section>

      <!--
        响应面板：
        输出最后一次请求的关键信息与完整响应正文。
      -->
      <section class="panel response-panel">
        <h2>响应结果</h2>
        <div id="responseMeta" class="response-meta">等待请求...</div>
        <pre id="responseBody" class="response-body"></pre>
      </section>

      <!--
        事件时间线：
        显示近期请求历史，便于回放操作过程和排查问题。
      -->
      <section class="panel log-panel">
        <h2>操作时间线</h2>
        <ul id="requestLog" class="log-list"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>

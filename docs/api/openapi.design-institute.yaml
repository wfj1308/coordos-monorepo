openapi: 3.0.3
info:
  title: CoordOS Design Institute API
  version: 0.2.0
  description: |
    OpenAPI baseline for `services/design-institute`.
    This spec is intentionally "implementation-first":
    - Path list is aligned to the current HTTP router.
    - Request/response schemas keep a permissive envelope where field sets are still evolving.
    - It is safe for client SDK generation and contract testing at endpoint level.
servers:
  - url: http://localhost:8090
    description: Local development
tags:
  - name: Health
  - name: Project
  - name: Contract
  - name: Gathering
  - name: Settlement
  - name: Invoice
  - name: CostTicket
  - name: Payment
  - name: Company
  - name: Employee
  - name: Achievement
  - name: Approval
  - name: Report
paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: designHealth
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # -------------------------- Project --------------------------
  /api/v1/projects:
    post:
      tags: [Project]
      summary: Create root project node
      operationId: createRootProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/GenericSuccess"
        default:
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Project]
      summary: List project nodes
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          schema: {type: string}
      responses:
        "200":
          $ref: "#/components/responses/GenericSuccess"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/projects/children:
    post:
      tags: [Project]
      summary: Create child project node
      operationId: createChildProject
      parameters:
        - name: parent_ref
          in: query
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/projects/get:
    get:
      tags: [Project]
      summary: Get project by ref
      operationId: getProject
      parameters:
        - name: ref
          in: query
          required: true
          schema: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/projects/status:
    put:
      tags: [Project]
      summary: Transition project status
      operationId: transitionProjectStatus
      parameters:
        - name: ref
          in: query
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Contract --------------------------
  /api/v1/contracts:
    post:
      tags: [Contract]
      summary: Create contract
      operationId: createContract
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
    get:
      tags: [Contract]
      summary: List contracts
      operationId: listContracts
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: keyword
          in: query
          schema: {type: string}
        - name: company_id
          in: query
          schema: {type: integer}
        - name: employee_id
          in: query
          schema: {type: integer}
        - name: parent_id
          in: query
          schema: {type: integer}
        - name: state
          in: query
          schema: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}:
    get:
      tags: [Contract]
      summary: Get contract by ID
      operationId: getContract
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}/approve:
    put:
      tags: [Contract]
      summary: Approve contract
      operationId: approveContract
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}/void:
    put:
      tags: [Contract]
      summary: Void contract
      operationId: voidContract
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}/finance-summary:
    get:
      tags: [Contract]
      summary: Get finance summary for contract
      operationId: contractFinanceSummary
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}


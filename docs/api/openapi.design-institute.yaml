components:
  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    From:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      schema:
        type: string
        format: date-time
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
      description: Implementation-first object envelope.
    HealthResponse:
      type: object
      properties:
        status: {type: string, example: ok}
        service: {type: string, example: design-institute}
        timestamp: {type: string, format: date-time}
      required: [status, service, timestamp]
    ErrorResponse:
      type: object
      properties:
        error: {type: string}
      required: [error]
    PartnerProfile:
      type: object
      required:
        [
          tenant_id,
          tenant_ref,
          target_audience,
          launch_entries,
          generated_at,
          qualification_layer,
          capability_layer,
          achievement_layer,
          capacity_layer,
        ]
      properties:
        tenant_id: {type: integer}
        tenant_ref: {type: string}
        target_audience: {type: string}
        launch_entries:
          type: array
          items: {type: string}
        generated_at: {type: string, format: date-time}
        qualification_layer:
          type: object
          required: [items, count]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/PartnerQualificationItem"
            count: {type: integer}
        capability_layer:
          $ref: "#/components/schemas/PartnerCapabilityLayer"
        achievement_layer:
          type: object
          required: [years, items, count]
          properties:
            years: {type: integer}
            items:
              type: array
              items:
                $ref: "#/components/schemas/PartnerAchievementSummary"
            count: {type: integer}
        capacity_layer:
          $ref: "#/components/schemas/PartnerCapacityLayer"
    PartnerQualificationItem:
      type: object
      required: [qual_type, label, cert_no]
      properties:
        qual_type: {type: string}
        label: {type: string}
        cert_no: {type: string}
        specialty: {type: string}
        scope: {type: string}
        verify_url: {type: string}
        issued_by: {type: string}
        level: {type: string}
        source_url: {type: string}
        updated_at: {type: string, format: date-time}
        genesis_ref: {type: string}
        credit_code: {type: string}
        valid_until: {type: string}
        rule_binding:
          type: array
          items: {type: string}
    PartnerCapabilityLayer:
      type: object
      required:
        [spu_types, spu_type_count, executable_executor_count, registered_engineer_count, qualification_type_counts, average_capability_level, executions_last_1y]
      properties:
        spu_types:
          type: array
          items: {type: string}
        spu_type_count: {type: integer}
        executable_executor_count: {type: integer}
        registered_engineer_count: {type: integer}
        qualification_type_counts:
          type: object
          additionalProperties:
            type: integer
        average_capability_level: {type: string}
        executions_last_1y: {type: integer}
    PartnerAchievementSummary:
      type: object
      required: [project_ref, settled_utxo_count, proof_hashes]
      properties:
        project_ref: {type: string}
        settled_utxo_count: {type: integer}
        latest_settled_at: {type: string, format: date-time}
        proof_hashes:
          type: array
          items: {type: string}
    PartnerCapacityLayer:
      type: object
      required: [in_hand_project_count, total_capacity_limit, remaining_capacity, by_specialty]
      properties:
        in_hand_project_count: {type: integer}
        total_capacity_limit: {type: integer}
        remaining_capacity: {type: integer}
        by_specialty:
          type: array
          items:
            $ref: "#/components/schemas/PartnerSpecialtyCapacity"
    PartnerSpecialtyCapacity:
      type: object
      required: [specialty, qualified_executors, capacity_limit, occupied_estimate, remaining_capacity]
      properties:
        specialty: {type: string}
        qualified_executors: {type: integer}
        capacity_limit: {type: integer}
        occupied_estimate: {type: integer}
        remaining_capacity: {type: integer}
  responses:
    GenericSuccess:
      description: Success response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

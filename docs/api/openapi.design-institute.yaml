components:
  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    From:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    To:
      name: to
      in: query
      schema:
        type: string
        format: date-time
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
      description: Implementation-first object envelope.
    HealthResponse:
      type: object
      properties:
        status: {type: string, example: ok}
        service: {type: string, example: design-institute}
        timestamp: {type: string, format: date-time}
      required: [status, service, timestamp]
    ErrorResponse:
      type: object
      properties:
        error: {type: string}
      required: [error]
  responses:
    GenericSuccess:
      description: Success response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

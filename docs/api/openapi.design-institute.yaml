openapi: 3.0.3
info:
  title: CoordOS Design Institute API
  version: 0.2.0
  description: |
    OpenAPI baseline for `services/design-institute`.
    This spec is intentionally "implementation-first":
    - Path list is aligned to the current HTTP router.
    - Request/response schemas keep a permissive envelope where field sets are still evolving.
    - It is safe for client SDK generation and contract testing at endpoint level.
servers:
  - url: http://localhost:8090
    description: Local development
tags:
  - name: Health
  - name: Project
  - name: Contract
  - name: Gathering
  - name: Settlement
  - name: Invoice
  - name: CostTicket
  - name: Payment
  - name: Company
  - name: Employee
  - name: Achievement
  - name: Approval
  - name: Report
  - name: Right
  - name: Resolve
  - name: Namespace
  - name: Register
  - name: Publishing
  - name: Public
  - name: Bidding
  - name: Compliance
  - name: ResourceBinding
paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: designHealth
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # -------------------------- Project --------------------------
  /api/v1/projects:
    post:
      tags: [Project]
      summary: Create root project node
      operationId: createRootProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/GenericSuccess"
        default:
          $ref: "#/components/responses/ErrorResponse"
    get:
      tags: [Project]
      summary: List project nodes
      operationId: listProjects
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: status
          in: query
          schema: {type: string}
      responses:
        "200":
          $ref: "#/components/responses/GenericSuccess"
        default:
          $ref: "#/components/responses/ErrorResponse"
  /api/v1/projects/children:
    post:
      tags: [Project]
      summary: Create child project node
      operationId: createChildProject
      parameters:
        - name: parent_ref
          in: query
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/projects/get:
    get:
      tags: [Project]
      summary: Get project by ref
      operationId: getProject
      parameters:
        - name: ref
          in: query
          required: true
          schema: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/projects/status:
    put:
      tags: [Project]
      summary: Transition project status
      operationId: transitionProjectStatus
      parameters:
        - name: ref
          in: query
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/projects/{ref}/resources:
    get:
      tags: [Project]
      summary: Get project resource evidence pack
      operationId: projectResources
      parameters:
        - name: ref
          in: path
          required: true
          schema: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/projects/{ref}/evidence-pack:
    get:
      tags: [Project]
      summary: Get project evidence pack (alias)
      operationId: projectEvidencePack
      parameters:
        - name: ref
          in: path
          required: true
          schema: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Contract --------------------------
  /api/v1/contracts:
    post:
      tags: [Contract]
      summary: Create contract
      operationId: createContract
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
    get:
      tags: [Contract]
      summary: List contracts
      operationId: listContracts
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: keyword
          in: query
          schema: {type: string}
        - name: company_id
          in: query
          schema: {type: integer}
        - name: employee_id
          in: query
          schema: {type: integer}
        - name: parent_id
          in: query
          schema: {type: integer}
        - name: state
          in: query
          schema: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}:
    get:
      tags: [Contract]
      summary: Get contract by ID
      operationId: getContract
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}/approve:
    put:
      tags: [Contract]
      summary: Approve contract
      operationId: approveContract
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}/void:
    put:
      tags: [Contract]
      summary: Void contract
      operationId: voidContract
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/contracts/{id}/finance-summary:
    get:
      tags: [Contract]
      summary: Get finance summary for contract
      operationId: contractFinanceSummary
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Gathering --------------------------
  /api/v1/gatherings:
    post:
      tags: [Gathering]
      summary: Create gathering
      operationId: createGathering
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
    get:
      tags: [Gathering]
      summary: List gatherings
      operationId: listGatherings
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/gatherings/{id}:
    get:
      tags: [Gathering]
      summary: Get gathering by ID
      operationId: getGathering
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/gatherings/{id}/approve:
    put:
      tags: [Gathering]
      summary: Approve gathering
      operationId: approveGathering
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Settlement --------------------------
  /api/v1/settlements:
    post:
      tags: [Settlement]
      summary: Create settlement
      operationId: createSettlement
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
    get:
      tags: [Settlement]
      summary: List settlements
      operationId: listSettlements
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/settlements/{id}:
    get:
      tags: [Settlement]
      summary: Get settlement by ID
      operationId: getSettlement
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/settlements/{id}/submit:
    put:
      tags: [Settlement]
      summary: Submit settlement
      operationId: submitSettlement
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/settlements/{id}/approve:
    put:
      tags: [Settlement]
      summary: Approve settlement
      operationId: approveSettlement
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/settlements/{id}/pay:
    put:
      tags: [Settlement]
      summary: Mark settlement as paid
      operationId: paySettlement
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/settlements/link-utxo:
    post:
      tags: [Settlement]
      summary: Bind settlement UTXO reference
      operationId: linkSettlementUTXO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                balance_id:
                  type: integer
                  format: int64
                  description: Target settlement row ID. Optional when project_ref is provided.
                project_ref:
                  type: string
                  description: Target project ref. Optional when balance_id is provided.
                utxo_ref:
                  type: string
                  description: UTXO ref to bind.
              required: [utxo_ref]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Invoice --------------------------
  /api/v1/invoices:
    post:
      tags: [Invoice]
      summary: Create invoice
      operationId: createInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
    get:
      tags: [Invoice]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/invoices/{id}:
    get:
      tags: [Invoice]
      summary: Get invoice by ID
      operationId: getInvoice
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/invoices/{id}/submit:
    put:
      tags: [Invoice]
      summary: Submit invoice
      operationId: submitInvoice
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/invoices/{id}/approve:
    put:
      tags: [Invoice]
      summary: Approve invoice
      operationId: approveInvoice
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/invoices/{id}/issue:
    put:
      tags: [Invoice]
      summary: Issue invoice
      operationId: issueInvoice
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/invoices/{id}/scrap:
    put:
      tags: [Invoice]
      summary: Scrap invoice
      operationId: scrapInvoice
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- CostTicket --------------------------
  /api/v1/costtickets:
    post:
      tags: [CostTicket]
      summary: Create cost ticket
      operationId: createCostTicket
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
    get:
      tags: [CostTicket]
      summary: List cost tickets
      operationId: listCostTickets
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/costtickets/{id}:
    get:
      tags: [CostTicket]
      summary: Get cost ticket by ID
      operationId: getCostTicket
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/costtickets/{id}/pay:
    put:
      tags: [CostTicket]
      summary: Mark cost ticket as paid
      operationId: payCostTicket
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Payment --------------------------
  /api/v1/payments:
    post:
      tags: [Payment]
      summary: Create payment request
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/payments/{id}:
    get:
      tags: [Payment]
      summary: Get payment by ID
      operationId: getPayment
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/payments/{id}/approve:
    put:
      tags: [Payment]
      summary: Approve payment
      operationId: approvePayment
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/payments/{id}/pay:
    put:
      tags: [Payment]
      summary: Mark payment as paid
      operationId: payPayment
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Company --------------------------
  /api/v1/companies:
    get:
      tags: [Company]
      summary: List companies
      operationId: listCompanies
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/companies/{id}:
    get:
      tags: [Company]
      summary: Get company by ID
      operationId: getCompany
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/companies/{id}/branches:
    get:
      tags: [Company]
      summary: List company branches
      operationId: listCompanyBranches
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/companies/{id}/bind-executor:
    put:
      tags: [Company]
      summary: Bind executor to company
      operationId: bindCompanyExecutor
      parameters: [{$ref: "#/components/parameters/PathID"}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Employee --------------------------
  /api/v1/employees:
    post:
      tags: [Employee]
      summary: Create employee
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
    get:
      tags: [Employee]
      summary: List employees
      operationId: listEmployees
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/employees/{id}:
    get:
      tags: [Employee]
      summary: Get employee by ID
      operationId: getEmployee
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/employees/{id}/resign:
    put:
      tags: [Employee]
      summary: Mark employee resigned
      operationId: resignEmployee
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/employees/{id}/bind-person:
    put:
      tags: [Employee]
      summary: Bind employee executor_ref to canonical person identity
      operationId: bindEmployeePerson
      parameters: [{$ref: "#/components/parameters/PathID"}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                person_identity:
                  type: string
                  description: Canonical identity input, converted to v://person/{identity}/executor.
                executor_ref:
                  type: string
                  description: Optional direct canonical executor ref.
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Achievement --------------------------
  /api/v1/achievements:
    get:
      tags: [Achievement]
      summary: List achievements
      operationId: listAchievements
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievements/{id}:
    get:
      tags: [Achievement]
      summary: Get achievement by ID
      operationId: getAchievement
      parameters: [{$ref: "#/components/parameters/PathID"}]
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievements/manual:
    post:
      tags: [Achievement]
      summary: Create manual achievement UTXO
      operationId: createManualAchievement
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "201": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievement/template/csv:
    get:
      tags: [Achievement]
      summary: Download achievement import CSV template
      operationId: getAchievementTemplateCSV
      responses:
        "200":
          description: CSV template content
          content:
            text/csv:
              schema:
                type: string
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievement/verify:
    get:
      tags: [Achievement]
      summary: Verify achievement or engineer receipt by ref
      operationId: verifyAchievementByRef
      parameters:
        - name: ref
          in: query
          required: true
          schema: {type: string}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        "404": {$ref: "#/components/responses/ErrorResponse"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievement/{ns}/batch/csv:
    post:
      tags: [Achievement]
      summary: Batch import achievements from CSV
      operationId: batchImportAchievementCSV
      parameters:
        - name: ns
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
          text/csv:
            schema:
              type: string
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievement/{ns}/batch/json:
    post:
      tags: [Achievement]
      summary: Batch import achievements from JSON
      operationId: batchImportAchievementJSON
      parameters:
        - name: ns
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  items: {$ref: "#/components/schemas/GenericObject"}
                - type: object
                  properties:
                    projects:
                      type: array
                      items: {$ref: "#/components/schemas/GenericObject"}
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievement/{ns}:
    get:
      tags: [Achievement]
      summary: Query enterprise achievement pool by namespace
      operationId: queryAchievementPool
      parameters:
        - name: ns
          in: path
          required: true
          schema: {type: string}
        - name: project_type
          in: query
          schema: {type: string}
        - name: min_amount
          in: query
          schema: {type: number}
        - name: within_3years
          in: query
          schema: {type: boolean}
        - name: within_5years
          in: query
          schema: {type: boolean}
        - name: source
          in: query
          schema: {type: string}
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}
  /api/v1/achievement/{ns}/engineer/{id}:
    get:
      tags: [Achievement]
      summary: Query engineer personal achievements by namespace and engineer ID
      operationId: queryEngineerAchievementPool
      parameters:
        - name: ns
          in: path
          required: true
          schema: {type: string}
        - name: id
          in: path
          required: true
          schema: {type: string}
        - name: project_type
          in: query
          schema: {type: string}
        - name: within_3years
          in: query
          schema: {type: boolean}
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200": {$ref: "#/components/responses/GenericSuccess"}
        default: {$ref: "#/components/responses/ErrorResponse"}

  # -------------------------- Right --------------------------
  /api/v1/rights:
    post:
      tags: [Right]
      summary: Create right resource
      operationId: createRight
      requestBody:
        required: true
        content:

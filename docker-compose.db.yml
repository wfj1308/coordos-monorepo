services:
  postgres:
    image: postgres:16
    container_name: coordos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "coordos"
      POSTGRES_PASSWORD: "coordos"
      POSTGRES_DB: "coordos"
      TZ: "Asia/Shanghai"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
